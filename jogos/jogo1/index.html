<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semeador - Agrofloresta</title>
    <!-- Importing global CSS and fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="assets/css/game.css">
</head>
<body class="bg-cream">
    <div class="container section-padding">
        <h1 class="text-center pixel-text" style="color: var(--green-dark);">Colheita Agroflorestal</h1>
        <p class="text-center" style="margin-bottom: 2rem;">Controle a minhoca e prepare o solo para as sementes do Cerrado!</p>
        
        <div class="game-wrapper">
            <div id="scoreDisplay" class="pixel-text text-center" style="font-size: 1.5rem; margin-bottom: 1rem; color: var(--green-dark);">Sementes colhidas: 0 | Recorde: 0</div>
            <div class="canvas-container" style="position: relative;">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <div id="gameOverOverlay" class="hidden overlay pixel-text">
                    <h2>Nova melhor colheita!</h2>
                    <input type="text" id="playerNameInput" maxlength="3" placeholder="AAA">
                    <button id="saveScoreBtn" class="btn btn-primary">Salvar</button>
                </div>
            </div>
            
            <div class="mobile-controls">
                <button class="d-pad-btn" id="btnUp">▲</button>
                <div class="d-pad-row">
                    <button class="d-pad-btn" id="btnLeft">◀</button>
                    <button class="d-pad-btn" id="btnDown">▼</button>
                    <button class="d-pad-btn" id="btnRight">▶</button>
                </div>
            </div>

            <div class="game-instructions text-center">
                <p>Use as <strong>Setas</strong>, <strong>WASD</strong> ou os <strong>botões</strong> para mover.</p>
                <button id="startBtn" class="btn btn-primary pixel-text" style="margin-top: 1rem;">Iniciar / Reiniciar</button>
            </div>
            
            <div id="leaderboard" class="pixel-text text-center mt-2">
                <h3>Top 3 Colheitas</h3>
                <ul id="leaderboardList" class="clean-list">
                    <!-- Populated via JS -->
                </ul>
            </div>

            <a href="../../index.html" class="pixel-text text-center" style="display:block; margin-top:2rem;">← Voltar para o site</a>
        </div>
    </div>

    <!-- Script loaded as module -->
    <script type="module">
        import { Game } from './assets/js/game.js';
        import { preloadAssets } from './assets/js/assets.js';
        
        const canvas = document.getElementById('gameCanvas');
        const startBtn = document.getElementById('startBtn');
        const game = new Game(canvas);
        
        startBtn.disabled = true;
        startBtn.innerText = 'Carregando...';
        
        preloadAssets(() => {
            startBtn.disabled = false;
            startBtn.innerText = 'Iniciar / Reiniciar';
            game.updateScoreDisplay();
            game.updateLeaderboardUI();
        });

        startBtn.addEventListener('click', () => {
            if (game.isGameOver) {
                game.restart();
            } else {
                game.start();
                // Initial movement to start right away
                if(game.snake.direction.x === 0 && game.snake.direction.y === 0) {
                   game.snake.changeDirection({ x: 1, y: 0 });
                }
            }
            startBtn.blur(); // Remove focus
        });

        // Mobile Controls
        document.getElementById('btnUp').addEventListener('click', () => game.handleInput({ key: 'ArrowUp' }));
        document.getElementById('btnDown').addEventListener('click', () => game.handleInput({ key: 'ArrowDown' }));
        document.getElementById('btnLeft').addEventListener('click', () => game.handleInput({ key: 'ArrowLeft' }));
        document.getElementById('btnRight').addEventListener('click', () => game.handleInput({ key: 'ArrowRight' }));
    </script>
</body>
</html>
